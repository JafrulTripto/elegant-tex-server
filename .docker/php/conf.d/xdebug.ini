zend_extension=xdebug

[xdebug]
xdebug.mode=debug
xdebug.client_host=172.17.0.1
; Changed from "yes" to "trigger" -- "yes" fires a debugger connection attempt
; on every single request (including all AI API calls), adding TCP timeout
; overhead each time. Use "trigger" so it only activates when you set the
; XDEBUG_SESSION cookie or XDEBUG_TRIGGER env var from your IDE.
xdebug.start_with_request=trigger
xdebug.idekey=VSCODE
